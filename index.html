<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>FATASS</title>
    <link href="https://fonts.googleapis.com/css2?family=Monaco&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav>
        <div class="logo-sm" onclick="showPage('home')">F<span class="a">A</span>T<span class="a">A</span>SS</div>
        <div class="nav-links">
            <button class="nav-btn" onclick="showPage('reviews')">Reviews</button>
            <button class="nav-btn" onclick="showPage('spin')">Spin</button>
            <button class="nav-btn" onclick="showPage('tier')">Tier List</button>
            <button class="nav-btn" onclick="showPage('add')">+ Add</button>
        </div>
    </nav>

    <div id="page-home" class="page active">
        <div class="home-logo">
            <h1>F<span class="a">A</span>T<span class="a">A</span>SS</h1>
            <p>// your crew's food diary //</p>
        </div>
        <div class="home-btns">
            <button class="home-nav-btn" onclick="showPage('reviews')">Reviews <span class="arrow">→</span></button>
            <button class="home-nav-btn" onclick="showPage('spin')">Spin the Wheel <span class="arrow">→</span></button>
            <button class="home-nav-btn" onclick="showPage('tier')">Tier List <span class="arrow">→</span></button>
        </div>
    </div>

    <div id="page-reviews" class="page">
        <div class="section-header">
            <h2>The Archives</h2>
        </div>
        <div id="restGrid" class="rest-grid"></div>
    </div>

    <div id="page-spin" class="page">
        <div class="spin-container">
            <div class="wheel-box">
                <canvas id="wheelCanvas" width="340" height="340"></canvas>
                <div id="wheelResult" class="wheel-result">
                    <div class="cuisine-sub">what's for lunch?</div>
                </div>
                <div id="resultActions" style="margin-top:10px;"></div>
                <button id="spinBtn" class="btn" style="margin-top:20px; width:100%;" onclick="spinWheel()">Spin Fate</button>
            </div>
            
            <div class="wheel-meta">
                <div class="meta-section">
                    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:1rem;">
                        <h3>The Wheel</h3>
                        <button class="btn-ghost" onclick="toggleEdit()">Edit Cuisines</button>
                    </div>
                    
                    <div id="cuisineViewList"></div>

                    <div id="cuisineEditPanel" style="display:none;">
                        <div style="display:flex; gap:5px; margin-bottom:1rem;">
                            <input type="text" id="newCuisineInput" class="modal-input" placeholder="Add cuisine..." style="flex:1;">
                            <button class="btn" style="padding:0 1rem;" onclick="addCuisine()">+</button>
                        </div>
                        <div id="cuisineEditList"></div>
                    </div>
                </div>

                <div class="meta-section">
                    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:1rem;">
                        <h3>History</h3>
                        <button class="btn-ghost" onclick="clearHistory()">Clear</button>
                    </div>
                    <div id="historyList"></div>
                </div>
            </div>
        </div>
    </div>

    <div id="page-tier" class="page">
        <div class="section-header">
            <h2>The Hierarchy</h2>
        </div>
        <div class="tier-board">
            <div class="tier-row"><div class="tier-label s">S</div><div id="tier-S" class="tier-content"></div></div>
            <div class="tier-row"><div class="tier-label a">A</div><div id="tier-A" class="tier-content"></div></div>
            <div class="tier-row"><div class="tier-label b">B</div><div id="tier-B" class="tier-content"></div></div>
            <div class="tier-row"><div class="tier-label c">C</div><div id="tier-C" class="tier-content"></div></div>
            <div class="tier-row"><div class="tier-label d">D</div><div id="tier-D" class="tier-content"></div></div>
            <div class="tier-row"><div class="tier-label f">F</div><div id="tier-F" class="tier-content"></div></div>
        </div>
    </div>

    <div id="page-add" class="page">
        <div class="add-container">
            <div class="section-header"><h2>New Review</h2></div>
            
            <div class="input-group">
                <label>Restaurant Name</label>
                <input type="text" id="inp-name" class="modal-input" placeholder="e.g. Maxwell Food Centre">
            </div>

            <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px;">
                <div class="input-group">
                    <label>Region</label>
                    <select id="inp-region" class="modal-input">
                        <option value="Central">Central</option>
                        <option value="East">East</option>
                        <option value="North">North</option>
                        <option value="North-East">North-East</option>
                        <option value="West">West</option>
                        <option value="South">South</option>
                    </select>
                </div>
                <div class="input-group">
                    <label>Town</label>
                    <input type="text" id="inp-town" class="modal-input" placeholder="e.g. Tanjong Pagar">
                </div>
            </div>

            <div class="input-group">
                <label>Google Maps Link (Optional)</label>
                <input type="text" id="inp-link" class="modal-input" placeholder="Paste URL here...">
            </div>

            <div class="input-group">
                <label>Cuisine</label>
                <input type="text" id="inp-cuisine" class="modal-input" placeholder="e.g. Japanese, Hawker">
            </div>

            <div class="input-group">
                <label>Reviewer</label>
                <div style="display:flex; gap:5px;">
                    <select id="inp-author" class="modal-input" style="flex:1;">
                        <option value="">Select Author...</option>
                    </select>
                    <button type="button" class="btn" style="padding:0 15px;" onclick="addNewAuthor()">+</button>
                </div>
            </div>

            <div class="input-group">
                <label>Rating Score</label>
                <input type="range" id="ratingSlider" min="0" max="10" step="0.1" value="7.0" style="width:100%;">
                <div id="ratingValueDisplay">7.0</div>
                <button type="button" class="btn-ghost" style="width:100%; margin-top:10px; border-style: dashed;" onclick="showTierGuide()">View Tier Guide</button>
            </div>

            <div class="input-group">
                <label>The Verdict</label>
                <textarea id="inp-review" class="modal-input" rows="4" placeholder="Be honest..."></textarea>
            </div>

            <div class="input-group">
                <label>Photo</label>
                <input type="file" id="inp-img" accept="image/*" class="modal-input">
            </div>

            <button class="btn btn-teal" style="width:100%; margin-top:1rem;" onclick="submitReview()">Post Review</button>
        </div>
    </div>

    <div class="modal-bg" id="editModal">
        <div class="modal" style="width: 450px; max-width: 95vw; overflow-y: auto; max-height: 90vh;">
            <h3 style="margin-bottom:1.5rem;">Edit Review</h3>
            
            <div class="input-group">
                <label>Restaurant Name</label>
                <input type="text" id="edit-name" class="modal-input">
            </div>

            <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px;">
                <div class="input-group">
                    <label>Region</label>
                    <select id="edit-region" class="modal-input">
                        <option value="Central">Central</option>
                        <option value="East">East</option>
                        <option value="North">North</option>
                        <option value="North-East">North-East</option>
                        <option value="West">West</option>
                        <option value="South">South</option>
                    </select>
                </div>
                <div class="input-group">
                    <label>Town</label>
                    <input type="text" id="edit-town" class="modal-input">
                </div>
            </div>

            <div class="input-group">
                <label>Google Maps Link</label>
                <input type="text" id="edit-link" class="modal-input">
            </div>

            <div class="input-group">
                <label>Cuisine</label>
                <input type="text" id="edit-cuisine" class="modal-input">
            </div>

            <div class="input-group">
                <label>Score</label>
                <input type="range" id="edit-rating-slider" min="0" max="10" step="0.1" style="width:100%;">
                <div id="edit-rating-display" style="text-align:center; font-weight:bold; font-size:1.5rem;"></div>
            </div>

            <div class="input-group">
                <label>Verdict</label>
                <textarea id="edit-review" class="modal-input" rows="4"></textarea>
            </div>

            <div class="input-group">
                <label>Add More Photos</label>
                <input type="file" id="edit-img-input" accept="image/*" multiple class="modal-input">
            </div>

            <div id="edit-image-preview-container" class="image-gallery" style="margin-bottom:1rem;"></div>

            <div style="display:flex; gap:10px;">
                <button class="btn btn-teal" style="flex:1" onclick="saveEdit()">Save</button>
                <button class="btn btn-ghost" style="flex:1" onclick="closeEditModal()">Cancel</button>
            </div>
        </div>
    </div>

    <div class="modal-bg" id="removeModal">
        <div class="modal">
            <p id="removeModalText" style="margin-bottom:1.5rem;"></p>
            <div style="display:flex; gap:10px;">
                <button class="btn btn-danger" style="flex:1">Remove</button>
                <button class="btn btn-ghost" style="flex:1" onclick="closeModal()">Cancel</button>
            </div>
        </div>
    </div>

    <div class="modal-bg" id="imageViewerModal" onclick="closeImageViewer()">
        <div class="image-viewer-content">
            <img id="fullSizeImage" src="" alt="Full size review">
        </div>
    </div>

    <div id="toast" class="toast"></div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

        const db = firebase.firestore();

    <script src="script.js"></script>
</body>
</html>
